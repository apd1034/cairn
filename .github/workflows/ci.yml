name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Syntax check
        run: python -m compileall cairn_cli.py tools skills/cairn-project-migration/scripts skills/cairn-report-writing/scripts
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Validate Cairn bundle
        run: cairn validate .
      - name: Build index
        run: cairn index .
      - name: Audit without writing report
        run: cairn audit . --json-only
